<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5;padding:20px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:20px 0}
.chart-box{background:#fff;border:2px solid #ccc;border-radius:12px;padding:20px;min-height:260px;display:flex;flex-direction:column}
.chart-box h3{font-size:13px;margin-bottom:10px;flex-shrink:0}
.chart-inner{flex:1;min-height:200px;border:1px dashed #aaa;position:relative}
#log{background:#222;color:#0f0;padding:16px;font-family:monospace;font-size:12px;margin-top:20px;border-radius:8px;white-space:pre-wrap}
</style>
</head>
<body>
<h2>圖表容器寬度診斷</h2>
<div class="charts">
  <div class="chart-box">
    <h3>圖表A</h3>
    <div class="chart-inner" id="cA"></div>
  </div>
  <div class="chart-box">
    <h3>圖表B</h3>
    <div class="chart-inner" id="cB"></div>
  </div>
</div>
<div id="log">診斷中...</div>

<script>
var log = document.getElementById('log');
function addLog(msg){ log.textContent += '\n' + msg; }

function checkWidth(id, tries){
  var el = document.getElementById(id);
  var W = el.getBoundingClientRect().width;
  addLog('[T='+tries+'] #'+id+' W='+W+' offsetW='+el.offsetWidth+' clientW='+el.clientWidth);
  if(W < 10 && tries < 20){
    setTimeout(function(){ checkWidth(id, tries+1); }, 200);
  } else {
    // 畫 SVG
    var svgW = W > 10 ? W : 300;
    el.innerHTML = '<svg viewBox="0 0 '+svgW+' 180" width="100%" style="display:block">'
      + '<rect x="10" y="10" width="'+(svgW-20)+'" height="160" fill="#e8f4ef" rx="8"/>'
      + '<text x="'+Math.round(svgW/2)+'" y="95" text-anchor="middle" font-size="14" fill="#0a5c4a">W='+Math.round(W)+'px</text>'
      + '</svg>';
    addLog('→ 畫圖完成 W='+Math.round(W));
  }
}

addLog('readyState: ' + document.readyState);
addLog('window.innerWidth: ' + window.innerWidth);

// 立即檢查
checkWidth('cA', 0);
checkWidth('cB', 0);

// load 後再查
window.addEventListener('load', function(){
  addLog('\n=== window.load ===');
  checkWidth('cA', 0);
  checkWidth('cB', 0);
});
</script>

</body>
</html>
